name: GM12878_chr14_10k
seed: 67
dataset: 4DNFIXP4QG5B
output_dir: outputs/4DNFIXP4QG5B_10k

preprocessing:
  mcool_path: /gladstone/engelhardt/lab/lchumpitaz/hi-c/mcools/4DNFIXP4QG5B.mcool
  resolution: 10000
  region: chr14
  balance: true
  contact_transform: log10
  num_replicates: 1
  noise_level: 0.15
  groups_by: chromhmm_state
  chromhmm_bed: /gladstone/engelhardt/lab/lchumpitaz/datasets/chromhmm/ENCFF140VIG.bed
  chromhmm_states: null
  gc_reference: /gladstone/engelhardt/home/lchumpitaz/gitclones/ChromGP/notebooks/hg38.fa

model:
  n_components: 3
  E: 1
  kernel: Matern52
  lengthscale: 400.0
  output_lengthscale: 1.0
  sigma: 1.0
  train_lengthscale: true
  num_inducing: 1500
  cholesky_mode: exp
  scale_kl_NM: true
  scale: 10000
  noise: 0.1
  jitter: 1e-5
  integrated_force: false
  group_diff_param: 0.1
  K: 50
  neighbors: probabilistic
  precompute_knn: true

training:
  max_iter: 500000
  learning_rate: 0.002
  optimizer: Adam
  device: gpu
  batch_size: 500
  y_batch_size: null
  shuffle: true
