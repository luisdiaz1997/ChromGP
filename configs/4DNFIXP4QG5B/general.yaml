name: GM12878_chr14
seed: 67
dataset: 4DNFIXP4QG5B
output_dir: outputs/4DNFIXP4QG5B

preprocessing:
  mcool_path: /gladstone/engelhardt/lab/lchumpitaz/hi-c/mcools/4DNFIXP4QG5B.mcool
  resolution: 25000
  region: chr14
  balance: true
  contact_transform: log1p
  num_replicates: 1
  noise_level: 0.15
  groups_by: chromhmm_state
  chromhmm_bed: /gladstone/engelhardt/lab/lchumpitaz/datasets/chromhmm/ENCFF140VIG.bed
  chromhmm_states: null

model:
  n_components: 3
  E: 1
  kernel: RBF
  lengthscale: 8.0
  sigma: 1.0
  train_lengthscale: false
  num_inducing: 800
  cholesky_mode: exp
  noise: 0.1
  jitter: 1e-5
  integrated_force: false

training:
  max_iter: 20000
  learning_rate: 0.002
  optimizer: Adam
  device: gpu
  batch_size: null
  shuffle: true
